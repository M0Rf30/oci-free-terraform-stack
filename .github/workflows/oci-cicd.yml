---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Execute OCI Pipeline"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        type: choice
        default: "apply"
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read

concurrency:
  # Never let two state-mutating runs race on the same remote state.
  group: oci-terraform
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  # OCI Object Storage S3-compatible credentials (an OCI Customer Secret Key)
  # used only by the Terraform S3 state backend.
  AWS_ACCESS_KEY_ID: ${{ secrets.OCI_S3_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.OCI_S3_SECRET_KEY }}
  # OCI's S3-compatible API rejects the AWS SDK's default "aws-chunked"
  # encoding + checksum trailers ("501 NotImplemented"). Force checksums to be
  # computed only when a request explicitly requires one, which avoids chunked
  # uploads on PutObject (state writes).
  AWS_REQUEST_CHECKSUM_CALCULATION: "WHEN_REQUIRED"
  AWS_RESPONSE_CHECKSUM_VALIDATION: "WHEN_REQUIRED"

jobs:
  terraform:
    name: "Terraform OCI Pipeline"
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.15.6"
          terraform_wrapper: false

      - name: Write OCI API signing key
        run: |
          umask 077
          printf '%s\n' "${{ secrets.PKEY }}" > pkey.pem
          # Normalise potential CRLF from the secret store.
          sed -i 's/\r$//' pkey.pem
          echo "TF_VAR_pkey_path=$(pwd)/pkey.pem" >> "$GITHUB_ENV"

      - name: Preflight - validate credentials
        run: |
          set -euo pipefail
          # 1) Key must be a valid, unencrypted PEM private key.
          if ! openssl pkey -in pkey.pem -noout 2>/dev/null; then
            echo "::error::PKEY is not a valid PEM private key. OCI needs an API"
            echo "::error::signing key in PEM (RSA/PKCS8) form, NOT an OpenSSH key."
            exit 1
          fi
          # 2) Computed fingerprint must match the FP secret.
          computed="$(openssl rsa -pubout -outform DER -in pkey.pem 2>/dev/null \
                       | openssl md5 -c | awk '{print $NF}')"
          configured="${{ secrets.FP }}"
          echo "computed fingerprint:   $computed"
          echo "configured fingerprint: $configured"
          if [ "$computed" != "$configured" ]; then
            echo "::error::FP secret does not match the PKEY fingerprint."
            echo "::error::Set FP to: $computed (or upload the matching public key in OCI)."
            exit 1
          fi
          echo "Credentials preflight passed."

      - name: Export Terraform variables
        run: |
          {
            echo "TF_VAR_tenancy_ocid=${{ secrets.TENANCY_OCID }}"
            echo "TF_VAR_user_ocid=${{ secrets.USER_OCID }}"
            echo "TF_VAR_fp=${{ secrets.FP }}"
            echo "TF_VAR_ssh_pub_key=${{ secrets.SSH_PUB_KEY }}"
            echo "TF_VAR_wg_client_pubkey=${{ secrets.WG_CLIENT_PUBKEY }}"
          } >> "$GITHUB_ENV"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: |
          if [ "${{ inputs.action }}" = "destroy" ]; then
            terraform plan -destroy -input=false -no-color
          else
            terraform plan -input=false -no-color
          fi

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false -no-color

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -auto-approve -input=false -no-color

      - name: Outputs
        if: inputs.action == 'apply'
        run: terraform output -no-color || true
